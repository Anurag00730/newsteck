name: News Briefing Hourly Auto-Update

on:
  schedule:
    # Run at minute 0 of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows pushing the updated JSON to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Fetch News Script
        run: python fetch_news.py

      - name: Compile Briefing
        run: python update_briefing.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_news.json briefing.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: Daily news update [skip ci]" && git push)
